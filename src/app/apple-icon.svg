<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Navy background, no border radius (Apple masks to rounded square itself) -->
  <rect width="180" height="180" fill="#080c18"/>

  <!-- "MT" monogram, centered, generous sizing -->

  <!-- "M" — x:18–96, y:50–130 -->
  <!-- Left vertical -->
  <rect x="18" y="50" width="16" height="80" fill="#c9a84c"/>
  <!-- Right vertical -->
  <rect x="62" y="50" width="16" height="80" fill="#c9a84c"/>
  <!-- Left diagonal: top-left corner down to center peak -->
  <polygon points="18,50 34,50 48,78 32,78" fill="#c9a84c"/>
  <!-- Right diagonal: center peak to top-right corner -->
  <polygon points="48,78 64,50 78,50 62,78" fill="#c9a84c"/>
  <!-- Fill center peak gap -->
  <polygon points="32,78 48,52 62,78" fill="#c9a84c"/>

  <!-- "T" — x:90–162, y:50–130 -->
  <!-- Crossbar -->
  <rect x="90" y="50" width="72" height="16" fill="#c9a84c"/>
  <!-- Stem -->
  <rect x="117" y="66" width="18" height="64" fill="#c9a84c"/>
</svg>
