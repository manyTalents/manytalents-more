# PKA Enforcement — generated by install.py
# DO NOT hand-edit this file unless you know what you're doing.
# Re-run: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/install.py <this-repo> --force
#
# Source of truth for rules: C:/Users/chris/OneDrive/Documentos/PKA/enforcement/.pre-commit-hooks.yaml
# Rule scripts (run standalone): C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_*.py
#
# Engine: repo: local with absolute entry paths.
# Why local instead of a remote repo?
#   - PKA is not published to GitHub yet. Once it is, swap this file for a
#     block that uses `repo: <pka-url>` + `rev: <pin>` and drop the absolute
#     paths. The rule scripts themselves do not change.
# Why language: system?
#   - Avoids pre-commit creating a dedicated venv per hook invocation.
#     Rule scripts are stdlib-only so they run on whatever python is on PATH.

repos:
  - repo: local
    hooks:
      - id: pka-timezone-aware
        name: "PKA #6 — timezone-aware datetimes"
        description: "Flag naive datetime.now() / datetime.utcnow() calls."
        entry: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_timezone_aware.py
        language: system
        types: [python]

      - id: pka-enqueue-job-id
        name: "PKA #7 — frappe.enqueue requires job_id with deduplicate=True"
        description: "Flag frappe.enqueue(..., deduplicate=True) missing job_id=."
        entry: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_enqueue_job_id.py
        language: system
        types: [python]

      - id: pka-hcp-customer-fields
        name: "PKA #11 — HCP customer fields"
        description: "Flag job.company_name being assigned as the customer name."
        entry: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_hcp_customer_fields.py
        language: system
        types: [python]

      - id: pka-no-workaround
        name: "PKA #14 — no untracked workaround comments"
        description: "Flag HACK/WORKAROUND/FIXME comments without a ticket reference."
        entry: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_no_workaround.py
        language: system
        types_or: [python, javascript, ts, tsx, jsx, shell, yaml, markdown, text]

      - id: pka-long-compute
        name: "PKA #19 — long-compute loops must checkpoint"
        description: "Flag loops >= 100 iters or unbounded iters with no checkpoint/persist/log call."
        entry: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_long_compute.py
        language: system
        types: [python]

      - id: pka-plaintext-secrets
        name: "PKA #20 — no plaintext secrets"
        description: "Flag API key patterns outside .env files. Bitwarden is the source of truth."
        entry: python C:/Users/chris/OneDrive/Documentos/PKA/enforcement/rules/check_plaintext_secrets.py
        language: system
        types_or: [python, javascript, ts, tsx, jsx, shell, yaml, markdown, text, toml, json]
